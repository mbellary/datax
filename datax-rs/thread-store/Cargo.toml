[package]
edition.workspace = true
license.workspace = true
name = "datax-thread-store"
version.workspace = true

[lib]
name = "datax_thread_store"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
chrono = { workspace = true, features = ["serde"] }
datax-git-utils = { workspace = true }
datax-install-context = { workspace = true }
datax-protocol = { workspace = true }
datax-rollout = { workspace = true }
datax-state = { workspace = true }
datax-utils-path = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
uuid = { workspace = true }
