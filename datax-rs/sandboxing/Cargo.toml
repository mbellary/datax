[package]
name = "datax-sandboxing"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "datax_sandboxing"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
datax-network-proxy = { workspace = true }
datax-protocol = { workspace = true }
datax-utils-absolute-path = { workspace = true }
datax-utils-path-uri = { workspace = true }
datax-windows-sandbox = { workspace = true }
dunce = { workspace = true }
libc = { workspace = true }
serde_json = { workspace = true }
regex-lite = { workspace = true }
tracing = { workspace = true, features = ["log"] }
url = { workspace = true }
which = { workspace = true }

[target.'cfg(windows)'.dependencies]
datax-utils-home-dir = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
