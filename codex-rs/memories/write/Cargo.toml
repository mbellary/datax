[package]
edition.workspace = true
license.workspace = true
name = "datax-memories-write"
version.workspace = true

[lib]
name = "datax_memories_write"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
datax-backend-client = { workspace = true }
datax-core = { workspace = true }
datax-config = { workspace = true }
datax-features = { workspace = true }
datax-git-utils = { workspace = true }
datax-login = { workspace = true }
datax-model-provider = { workspace = true }
datax-otel = { workspace = true }
datax-protocol = { workspace = true }
datax-rollout = { workspace = true }
datax-rollout-trace = { workspace = true }
datax-secrets = { workspace = true }
datax-state = { workspace = true }
datax-terminal-detection = { workspace = true }
datax-utils-absolute-path = { workspace = true }
datax-utils-output-truncation = { workspace = true }
datax-utils-template = { workspace = true }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "rt", "sync", "time"] }
tracing = { workspace = true, features = ["log"] }
uuid = { workspace = true, features = ["v4", "v5"] }

[dev-dependencies]
datax-model-provider-info = { workspace = true }
datax-models-manager = { workspace = true }
core_test_support = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
wiremock = { workspace = true }
