[package]
edition.workspace = true
license.workspace = true
name = "datax-skills-extension"
version.workspace = true

[lib]
name = "datax_skills_extension"
path = "src/lib.rs"
test = false
doctest = false

[lints]
workspace = true

[dependencies]
datax-core-skills = { workspace = true }
datax-exec-server = { workspace = true }
datax-extension-api = { workspace = true }
datax-mcp = { workspace = true }
datax-protocol = { workspace = true }
datax-tools = { workspace = true }
datax-utils-absolute-path = { workspace = true }
datax-utils-path-uri = { workspace = true }
datax-utils-string = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time"] }
tracing = { workspace = true }
url = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
