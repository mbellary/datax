[package]
edition.workspace = true
license.workspace = true
name = "datax-core"
version.workspace = true

[lib]
name = "datax_core"
path = "src/lib.rs"

[[bin]]
name = "datax-write-config-schema"
path = "src/bin/config_schema.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
arc-swap = { workspace = true }
async-channel = { workspace = true }
base64 = { workspace = true }
bm25 = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
clap = { workspace = true, features = ["derive"] }
datax-analytics = { workspace = true }
datax-api = { workspace = true }
datax-app-server-protocol = { workspace = true }
datax-apply-patch = { workspace = true }
datax-async-utils = { workspace = true }
datax-code-mode = { workspace = true }
datax-connectors = { workspace = true }
datax-context-fragments = { workspace = true }
datax-config = { workspace = true }
datax-core-plugins = { workspace = true }
datax-core-skills = { workspace = true }
datax-exec-server = { workspace = true }
datax-extension-api = { workspace = true }
datax-features = { workspace = true }
datax-feedback = { workspace = true }
datax-file-system = { workspace = true }
datax-login = { workspace = true }
datax-memories-read = { workspace = true }
datax-mcp = { workspace = true }
datax-model-provider-info = { workspace = true }
datax-models-manager = { workspace = true }
datax-shell-command = { workspace = true }
datax-execpolicy = { workspace = true }
datax-git-utils = { workspace = true }
datax-hooks = { workspace = true }
datax-install-context = { workspace = true }
datax-network-proxy = { workspace = true }
datax-otel = { workspace = true }
datax-plugin = { workspace = true }
datax-model-provider = { workspace = true }
datax-protocol = { workspace = true }
datax-response-debug-context = { workspace = true }
datax-prompts = { workspace = true }
datax-rollout = { workspace = true }
datax-rollout-trace = { workspace = true }
datax-rmcp-client = { workspace = true }
datax-sandboxing = { workspace = true }
datax-state = { workspace = true }
datax-terminal-detection = { workspace = true }
datax-thread-store = { workspace = true }
datax-tools = { workspace = true }
datax-utils-absolute-path = { workspace = true }
datax-utils-cache = { workspace = true }
datax-utils-image = { workspace = true }
datax-utils-home-dir = { workspace = true }
datax-utils-output-truncation = { workspace = true }
datax-utils-path = { workspace = true }
datax-utils-path-uri = { workspace = true }
datax-utils-plugins = { workspace = true }
datax-utils-pty = { workspace = true }
datax-utils-string = { workspace = true }
datax-utils-stream-parser = { workspace = true }
datax-windows-sandbox = { package = "datax-windows-sandbox", path = "../windows-sandbox-rs" }
csv = { workspace = true }
dirs = { workspace = true }
dunce = { workspace = true }
eventsource-stream = { workspace = true }
futures = { workspace = true }
http = { workspace = true }
iana-time-zone = { workspace = true }
image = { workspace = true, features = ["jpeg", "png", "webp"] }
indexmap = { workspace = true }
libc = { workspace = true }
once_cell = { workspace = true }
rand = { workspace = true }
regex-lite = { workspace = true }
reqwest = { workspace = true, features = ["json", "stream"] }
rmcp = { workspace = true, default-features = false, features = [
    "base64",
    "macros",
    "schemars",
    "server",
] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha1 = { workspace = true }
shlex = { workspace = true }
similar = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tokio-util = { workspace = true, features = ["rt"] }
tokio-tungstenite = { workspace = true }
toml = { workspace = true }
toml_edit = { workspace = true }
tracing = { workspace = true, features = ["log"] }
url = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4", "v5"] }
which = { workspace = true }
whoami = { workspace = true }

# Build OpenSSL from source for musl builds.
[target.x86_64-unknown-linux-musl.dependencies]
openssl-sys = { workspace = true, features = ["vendored"] }

# Build OpenSSL from source for musl builds.
[target.aarch64-unknown-linux-musl.dependencies]
openssl-sys = { workspace = true, features = ["vendored"] }

[target.'cfg(unix)'.dependencies]
datax-shell-escalation = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
assert_matches = { workspace = true }
datax-image-generation-extension = { workspace = true }
datax-home = { workspace = true }
datax-otel = { workspace = true }
datax-test-binary-support = { workspace = true }
datax-utils-cargo-bin = { workspace = true }
datax-web-search-extension = { workspace = true }
core_test_support = { workspace = true }
ctor = { workspace = true }
insta = { workspace = true }
maplit = { workspace = true }
opentelemetry = { workspace = true }
predicates = { workspace = true }
pretty_assertions = { workspace = true }
test-case = "3.3.1"
opentelemetry_sdk = { workspace = true, features = [
    "experimental_metrics_custom_reader",
    "metrics",
] }
serial_test = { workspace = true }
tempfile = { workspace = true }
test-log = { workspace = true }
tracing-opentelemetry = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-test = { workspace = true, features = ["no-env-filter"] }
walkdir = { workspace = true }
wiremock = { workspace = true }
zstd = { workspace = true }

[package.metadata.cargo-shear]
ignored = ["openssl-sys"]
ignored-paths = ["tests/remote_env_windows/*.rs"]
