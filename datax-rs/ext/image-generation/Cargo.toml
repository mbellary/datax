[package]
edition.workspace = true
license.workspace = true
name = "datax-image-generation-extension"
version.workspace = true

[lib]
name = "datax_image_generation_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
datax-api = { workspace = true }
datax-core = { workspace = true }
datax-extension-api = { workspace = true }
datax-login = { workspace = true }
datax-model-provider = { workspace = true }
datax-model-provider-info = { workspace = true }
datax-protocol = { workspace = true }
datax-tools = { workspace = true }
datax-utils-absolute-path = { workspace = true }
datax-utils-image = { workspace = true }
datax-utils-path-uri = { workspace = true }
http = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
