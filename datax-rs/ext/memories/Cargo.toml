[package]
edition.workspace = true
license.workspace = true
name = "datax-memories-extension"
version.workspace = true

[lib]
name = "datax_memories_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
datax-core = { workspace = true }
datax-extension-api = { workspace = true }
datax-features = { workspace = true }
datax-otel = { workspace = true }
datax-tools = { workspace = true }
datax-utils-absolute-path = { workspace = true }
datax-utils-output-truncation = { workspace = true }
datax-utils-template = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
