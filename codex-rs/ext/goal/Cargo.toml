[package]
edition.workspace = true
license.workspace = true
name = "datax-goal-extension"
version.workspace = true

[lib]
name = "datax_goal_extension"
path = "src/lib.rs"
test = false
doctest = false

[lints]
workspace = true

[dependencies]
datax-analytics = { workspace = true }
datax-core = { workspace = true }
datax-extension-api = { workspace = true }
datax-otel = { workspace = true }
datax-protocol = { workspace = true }
datax-state = { workspace = true }
datax-tools = { workspace = true }
datax-utils-template = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
