[package]
edition.workspace = true
license.workspace = true
name = "datax-mcp-extension"
version.workspace = true

[lib]
name = "datax_mcp_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
datax-core = { workspace = true }
datax-core-plugins = { workspace = true }
datax-config = { workspace = true }
datax-exec-server = { workspace = true }
datax-extension-api = { workspace = true }
datax-features = { workspace = true }
datax-mcp = { workspace = true }
datax-plugin = { workspace = true }
datax-protocol = { workspace = true }
datax-utils-absolute-path = { workspace = true }
datax-utils-path-uri = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, features = ["sync"] }

[dev-dependencies]
datax-login = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
